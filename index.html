<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Arda Eker">
  <meta name="description"
    content="This is a solution to the Order summary card challenge on Frontend Mentor. Frontend Mentor challenges help you improve your coding skills by building realistic projects. ">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Order summary card</title>
  <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>

  <main>
    <article class="container">
      <img src="./src/images/illustration-hero.svg" alt="Illustration Hero Image">
      <div class="content">
        <h2>Order Summary</h2>
        <p class="content-text">You can now listen to millions of songs, audiobooks, and podcasts on any
          device anywhere you like!</p>
        <div class="plan">
          <div class="plan-detail">
            <img src="./src/images/icon-music.svg" alt="Music Icon">
            <div class="plan-name">
              <p class="plan-header">Annual Plan</p>
              <p class="plan-price">$59.99/year</p>
            </div>
          </div>
          <a href="#">Change</a>
        </div>

        <a class="payment-button" href="#">Proceed to Payment</a>
        <a class="cancel-button" href="#">Cancel Order</a>

      </div>
    </article>

  </main>

  <footer>
    Challenge by &nbsp;<a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    &nbsp;Coded by &nbsp;<a href="https://www.frontendmentor.io/profile/ardaekerFD">Arda Eker</a>.
  </footer>
</body>

</html>
